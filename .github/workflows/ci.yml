name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# Aikido Safe Chain blocks installs of packages younger than this many hours
# (168h = 7d) to mitigate fresh supply-chain attacks. The installer itself is
# pinned by version + sha256 so a tampered "latest" can't slip into CI.
env:
  SAFE_CHAIN_MINIMUM_PACKAGE_AGE_HOURS: "168"
  SAFE_CHAIN_VERSION: "1.5.8"
  SAFE_CHAIN_INSTALLER_SHA256: "abf0d2a580ecb43270f559814edeb5671dd089839fe67478bf9a11acdb2813a0"
  BUN_VERSION: "1.3.13"

jobs:
  biome:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: Install Aikido Safe Chain
        run: |
          curl -fsSL -o install-safe-chain.sh \
            "https://github.com/AikidoSec/safe-chain/releases/download/${SAFE_CHAIN_VERSION}/install-safe-chain.sh"
          echo "${SAFE_CHAIN_INSTALLER_SHA256}  install-safe-chain.sh" | sha256sum -c -
          sh install-safe-chain.sh --ci
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Biome check (format + lint)
        run: bun x biome ci .

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: Install Aikido Safe Chain
        run: |
          curl -fsSL -o install-safe-chain.sh \
            "https://github.com/AikidoSec/safe-chain/releases/download/${SAFE_CHAIN_VERSION}/install-safe-chain.sh"
          echo "${SAFE_CHAIN_INSTALLER_SHA256}  install-safe-chain.sh" | sha256sum -c -
          sh install-safe-chain.sh --ci
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Typecheck
        run: bun run typecheck

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: Install Aikido Safe Chain
        run: |
          curl -fsSL -o install-safe-chain.sh \
            "https://github.com/AikidoSec/safe-chain/releases/download/${SAFE_CHAIN_VERSION}/install-safe-chain.sh"
          echo "${SAFE_CHAIN_INSTALLER_SHA256}  install-safe-chain.sh" | sha256sum -c -
          sh install-safe-chain.sh --ci
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Run tests
        run: bun test
